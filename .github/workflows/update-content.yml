name: Update Content

on:
  push:
    branches:
      - section_occurences # Trigger the workflow on pushes to section branches
      - section_ranges
      - section_bellavance
      - quarto-web

jobs:
  update-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set Up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Copy Content to Master Branch (section_occurences)
        run: |
          SECTION_BRANCH='section_occurences'
          SECTION_CONTENT_PATH='results'
          git checkout $SECTION_BRANCH -- $SECTION_CONTENT_PATH/
          git checkout quarto-web -- $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv $SECTION_CONTENT_PATH/*.csv $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv $SECTION_CONTENT_PATH/*.png $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv README.md $SECTION_CONTENT_PATH/$SECTION_BRANCH/description.md
          git add .
          git commit -m "Copy content from $SECTION_BRANCH to quarto-web"
          git push origin quarto-web

      - name: Copy Content to Master Branch (section_ranges)
        run: |
          SECTION_BRANCH='section_ranges'
          SECTION_CONTENT_PATH='results'
          git checkout $SECTION_BRANCH -- $SECTION_CONTENT_PATH/
          git checkout quarto-web -- $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv $SECTION_CONTENT_PATH/*.csv $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv $SECTION_CONTENT_PATH/*.png $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv README.md $SECTION_CONTENT_PATH/$SECTION_BRANCH/description.md
          git add .
          git commit -m "Copy content from $SECTION_BRANCH to quarto-web"
          git push origin quarto-web

      - name: Copy Content to Master Branch (section_bellavance)
        run: |
          SECTION_BRANCH='section_bellavance'
          SECTION_CONTENT_PATH='results'
          git checkout $SECTION_BRANCH -- $SECTION_CONTENT_PATH/
          git checkout quarto-web -- $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv $SECTION_CONTENT_PATH/*.csv $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv $SECTION_CONTENT_PATH/*.png $SECTION_CONTENT_PATH/$SECTION_BRANCH/
          mv README.md $SECTION_CONTENT_PATH/$SECTION_BRANCH/description.md
          git add .
          git commit -m "Copy content from $SECTION_BRANCH to quarto-web"
          git push origin quarto-web

